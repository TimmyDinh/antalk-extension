<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: transparent; overflow: hidden; height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; color: #e0e0e0; }

.panel {
  display: flex; flex-direction: column; height: 100%;
  background: rgba(20,20,35,0.96); border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.12);
  overflow: hidden;
}

/* ─── Toolbar ─── */
.toolbar {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0; user-select: none; cursor: grab;
}
.toolbar:active { cursor: grabbing; }
.drag-hint { font-size: 14px; color: #444; cursor: grab; margin-right: 2px; }
.btn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; color: #ccc; font-size: 11px; padding: 3px 8px;
  cursor: pointer; white-space: nowrap; font-family: inherit;
}
.btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
.btn.active { background: rgba(76,175,80,0.3); border-color: rgba(76,175,80,0.5); color: #4CAF50; }
.btn.stop { background: rgba(244,67,54,0.25); border-color: rgba(244,67,54,0.4); color: #f44336; font-size: 13px; }
.btn.stop:hover { background: rgba(244,67,54,0.4); }
.btn.icon { background: none; border: none; font-size: 14px; color: #888; padding: 3px 5px; }
.btn.icon:hover { color: #fff; }
.btn.close { margin-left: auto; }
.btn.close:hover { color: #f44336; }
.status { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #888; margin: 0 2px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #666; }
.dot.on { background: #4CAF50; box-shadow: 0 0 6px rgba(76,175,80,0.6); }
.sep { width: 1px; height: 16px; background: rgba(255,255,255,0.1); }

/* ─── Language Bar ─── */
.lang-bar {
  display: flex; align-items: center; gap: 5px; padding: 5px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
}
.lang-sel {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 5px; color: #ccc; font-size: 11px; padding: 2px 4px;
  font-family: inherit; cursor: pointer;
}
.lang-sel option { background: #1a1a2e; color: #e0e0e0; }
.swap-btn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 5px; color: #ccc; font-size: 13px; padding: 1px 6px;
  cursor: pointer; font-family: inherit;
}
.swap-btn:hover { color: #fff; background: rgba(255,255,255,0.15); }
.engine-lbl { font-size: 10px; color: #666; margin-left: auto; }

/* ─── Dual Panel Area ─── */
.panels-container {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  min-height: 0;
}
.panel-row {
  flex: 1; display: flex; flex-direction: row; gap: 1px;
  background: rgba(255,255,255,0.06);
  min-height: 0; overflow: hidden;
}
.text-panel {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: rgba(20,20,35,0.96);
}
.panel-header {
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; padding: 4px 10px; flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.panel-header.source { color: #f06292; }
.panel-header.target { color: #4CAF50; }
.panel-content {
  flex: 1; overflow-y: auto; padding: 6px 10px; font-size: 13px;
  line-height: 1.5; white-space: pre-wrap; min-height: 0;
}
.panel-content::-webkit-scrollbar { width: 3px; }
.panel-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
.panel-content.source-text { color: #bbb; }
.panel-content.target-text { color: #e8e8e8; }
.pinyin { font-size: 10px; color: #888; font-style: italic; }
.partial { color: #555; font-style: italic; }
.placeholder { color: #444; font-style: italic; text-align: center; padding: 16px 0; font-size: 12px; }
</style>
<!-- Pinyin library for Chinese -->
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.js"></script>
</head>
<body>
<div class="panel">
  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <span class="drag-hint" title="Drag to move">&#9776;</span>
    <button class="btn icon" id="settings-btn" title="Settings">&#9881;</button>
    <div class="status"><span class="dot" id="dot"></span><span id="status-text">Ready</span></div>
    <span class="sep"></span>
    <button class="btn active" id="system-btn">SYSTEM</button>
    <button class="btn" id="mic-btn">MIC</button>
    <span class="sep"></span>
    <button class="btn stop" id="stop-btn" title="Stop">&#9632;</button>
    <button class="btn" id="tts-btn">&#128264; TTS</button>
    <span class="sep"></span>
    <button class="btn" id="clear-btn">CLEAR</button>
    <button class="btn" id="copy-btn">COPY</button>
    <button class="btn icon close" id="close-btn" title="Close">&times;</button>
  </div>

  <!-- Language Bar -->
  <div class="lang-bar">
    <select class="lang-sel" id="source-lang"></select>
    <button class="swap-btn" id="swap-btn" title="Swap languages">&#8644;</button>
    <select class="lang-sel" id="target-lang"></select>
    <span class="engine-lbl" id="engine-label">Soniox</span>
  </div>

  <!-- Dual Panels: Source (heard) | Target (translation) -->
  <div class="panels-container">
    <div class="panel-row">
      <div class="text-panel">
        <div class="panel-header source" id="source-header">HEARD</div>
        <div class="panel-content source-text" id="source-content">
          <div class="placeholder">Waiting for audio...</div>
        </div>
      </div>
      <div class="text-panel">
        <div class="panel-header target" id="target-header">TRANSLATION</div>
        <div class="panel-content target-text" id="target-content">
          <div class="placeholder">Translation will appear here</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="overlay.js"></script>
</body>
</html>
