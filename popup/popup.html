<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 img { width: 22px; height: 22px; }
    .section {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    select, input {
      width: 100%;
      padding: 7px 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    select:focus, input:focus {
      border-color: rgba(76,175,80,0.5);
    }
    select option { background: #1a1a2e; }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .row select { flex: 1; }
    .arrow { color: #666; font-size: 16px; flex-shrink: 0; }
    .mode-row {
      display: flex;
      gap: 6px;
    }
    .mode-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      color: #aaa;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .mode-btn:hover { background: rgba(255,255,255,0.12); }
    .mode-btn.active {
      background: rgba(76,175,80,0.25);
      border-color: rgba(76,175,80,0.5);
      color: #4CAF50;
    }
    .start-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .start-btn:hover { background: #43a047; }
    .start-btn.active {
      background: #f44336;
    }
    .start-btn.active:hover { background: #e53935; }
    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
    .warning {
      font-size: 11px;
      color: #ff9800;
      margin-top: 4px;
      display: none;
    }
    .settings-link {
      display: block;
      text-align: center;
      color: #888;
      font-size: 11px;
      margin-top: 10px;
      text-decoration: none;
    }
    .settings-link:hover { color: #ccc; }
  </style>
</head>
<body>
  <h1>
    <img src="../icons/icon48.png" alt="AnTalk">
    AnTalk Translator
  </h1>

  <div class="section">
    <label>Audio Source</label>
    <div class="mode-row">
      <button class="mode-btn active" data-mode="SYSTEM">&#128264; SYSTEM</button>
      <button class="mode-btn" data-mode="MIC">&#127908; MIC</button>
    </div>
    <div class="hint" id="mode-hint">Captures audio from the current tab</div>
    <div class="warning" id="soniox-warning">System audio requires Soniox engine</div>
  </div>

  <div class="section">
    <label>STT Engine</label>
    <select id="engine">
      <option value="free">Free (Web Speech)</option>
      <option value="soniox">Soniox (API key needed)</option>
    </select>
  </div>

  <div class="section">
    <label>Languages</label>
    <div class="row">
      <select id="source-lang"></select>
      <button id="swap-btn" class="arrow" style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:6px; color:#ccc; font-size:15px; padding:2px 8px; cursor:pointer; flex-shrink:0;" title="Swap languages">&#8644;</button>
      <select id="target-lang"></select>
    </div>
  </div>

  <div class="section">
    <label>Display Mode</label>
    <div class="mode-row">
      <button class="mode-btn active" data-display="panel">&#128196; Panel</button>
      <button class="mode-btn" data-display="subtitle">&#127916; Subtitles</button>
    </div>
    <div class="hint" id="display-hint">Floating overlay panel</div>
  </div>

  <div class="section">
    <button class="start-btn" id="start-btn">Start Translating</button>
  </div>

  <a href="#" class="settings-link" id="settings-link">&#9881; Settings</a>

  <script src="popup.js"></script>
</body>
</html>
